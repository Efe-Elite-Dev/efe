name: "SKY OS Core: Ultimate Enterprise Build System"

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write
  packages: write

jobs:
  # 1. ETAP: KODUN KALİTE KONTROLÜ
  audit:
    name: "Siber Güvenlik ve Kod Analizi"
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4

      - name: C Derleyicisi ile Ön Kontrol (Syntax Linting)
        run: |
          gcc -m32 -fsyntax-only -Wall -Wextra -ffreestanding *.c 2>&1 || echo "Uyarılar incelenmeli!"

  # 2. ETAP: SAF BASH İLE ULTRA OPTİMİZE DERLEME BANDI (MAKEFILE YOK!)
  build:
    name: "Bare-Metal Çapraz Derleme Sistemi"
    needs: audit
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4

      - name: Gelişmiş Endüstriyel Derleme Araçlarını Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            gcc-multilib \
            genisoimage \
            nasm

      - name: Saf Komutlarla Derleme ve Bağlama (Link) İşlemi
        run: |
          echo "=== SKY OS DERLEME SÜRECİ BAŞLADI ==="
          
          # 1. Assembly dosyalarını derle
          nasm -f elf32 boot.asm -o boot.o
          
          # 2. Tüm C alt sistemlerini tek tek derle
          gcc -m32 -c -ffreestanding -O2 -Wall -Wextra -I. sky_subsystem.c -o sky_subsystem.o
          gcc -m32 -c -ffreestanding -O2 -Wall -Wextra -I. kernel.c -o kernel.o
          gcc -m32 -c -ffreestanding -O2 -Wall -Wextra -I. mouse.c -o mouse.o
          gcc -m32 -c -ffreestanding -O2 -Wall -Wextra -I. screen.c -o screen.o
          gcc -m32 -c -ffreestanding -O2 -Wall -Wextra -I. gui.c -o gui.o
          gcc -m32 -c -ffreestanding -O2 -Wall -Wextra -I. ai_subsystem.c -o ai_subsystem.o
          gcc -m32 -c -ffreestanding -O2 -Wall -Wextra -I. deb_subsystem.c -o deb_subsystem.o
          gcc -m32 -c -ffreestanding -O2 -Wall -Wextra -I. exe_subsystem.c -o exe_subsystem.o
          gcc -m32 -c -ffreestanding -O2 -Wall -Wextra -I. keyboard.c -o keyboard.o
          gcc -m32 -c -ffreestanding -O2 -Wall -Wextra -I. idt.c -o idt.o
          
          # 3. Doğru emülasyon moduyla (elf_i386) hepsini birbirine bağla
          ld -m elf_i386 -nostdlib -nodefaultlibs -T linker.ld boot.o sky_subsystem.o kernel.o mouse.o screen.o gui.o ai_subsystem.o deb_subsystem.o exe_subsystem.o keyboard.o idt.o -o kernel.bin
          
          echo "=== KERNEL.BIN BASARIYLA URETILDI ==="

      - name: Otomatik ISO Kalıbı Oluşturma (GRUB Entegrasyonu)
        run: |
          echo "=== ISO Yapilandirmasi Baslatiliyor ==="
          
          # Klasör yapısını sunucuda sıfırdan kur
          mkdir -p iso_root/boot/grub
          
          # Üretilen kerneli içine at
          cp kernel.bin iso_root/boot/
          
          # grub.cfg dosyasını dinamik olarak içine yaz
          echo 'menuentry "SKY OS Core" {' > iso_root/boot/grub/grub.cfg
          echo '    multiboot /boot/kernel.bin' >> iso_root/boot/grub/grub.cfg
          echo '    boot' >> iso_root/boot/grub/grub.cfg
          echo '}' >> iso_root/boot/grub/grub.cfg
          
          # ISO'yu paketle
          genisoimage -R -b boot/grub/stage2_eltorito -no-emul-boot -boot-load-size 4 -boot-info-table -o skyos.iso iso_root 2>/dev/null || \
          genisoimage -R -o skyos.iso iso_root
          
          echo "=== ISO BOYUTLARI ==="
          echo "ISO Boyutu: $(du -sh skyos.iso)"
          echo "Kernel Boyutu: $(du -sh kernel.bin)"

      - name: Çıktıları Güvenli Artefakt Olarak Sakla (Artifact Depolama)
        uses: actions/upload-artifact@v4
        with:
          name: skyos-production-build
          path: |
            *.bin
            *.iso
          retention-days: 7

  # 3. ETAP: OTOMATİK SÜRÜM DAĞITIM SİSTEMİ (RELEASE AUTO-PILOT)
  release:
    name: "Otomatik GitHub Release Dağıtımı"
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4

      - name: Üretilen ISO Paketini İndir
        uses: actions/download-artifact@v4
        with:
          name: skyos-production-build

      - name: Benzersiz Sürüm Kimliği Oluştur (Build ID)
        id: versioning
        run: |
          echo "VERSION=v2.1.${{ github.run_number }}" >> $GITHUB_ENV
          echo "DATE=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_ENV

      - name: Otomatik GitHub Sürümü (Release) Yayınla
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "SKY OS Core Integration ${{ env.VERSION }}"
          body: |
            ## 🚀 SKY OS Core - Otomatik Derleme Raporu
            Bu sürüm GitHub Actions tarafından tamamen optimize edilerek otomatik olarak üretilmiştir.
            
            - **Derleme Tarihi:** ${{ env.DATE }}
            - **İş Hattı (Run ID):** #${{ github.run_number }}
            - **Commit Mesajı:** `${{ github.event.head_commit.message }}`
            - **Mimarisi:** x86 Korumalı Mod (32-Bit HAL central)
            
            *Sanal makinenizde (VirtualBox/QEMU) çalıştırmak için aşağıdaki `skyos.iso` dosyasını indirin.*
          draft: false
          prerelease: false
          files: |
            skyos.iso
            kernel.bin
