name: Sky-OS Safe Auto Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla (Checkout)
      uses: actions/checkout@v4

    - name: Gerekli Derleme Araçlarını Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm gcc-multilib xorriso grub-pc-bin grub-common mtools

    - name: Kernel ve Bootloader Derle
      run: |
        echo "[+] Saf derleme baslatiliyor..."
        nasm -f elf32 boot.asm -o boot.o
        gcc -m32 -c kernel.c -o kernel.o -std=gnu99 -ffreestanding -O2 -Wall -Wextra
        ld -m elf_i386 -T linker.ld boot.o kernel.o -o mykernel.bin

    - name: ISO Klasor Yapisini Kur
      run: |
        mkdir -p iso/boot/grub
        cp mykernel.bin iso/boot/
        
        cat << 'GRUB_EOF' > iso/boot/grub/grub.cfg
        set timeout=0
        set default=0
        menuentry "Sky-OS" {
            multiboot /boot/mykernel.bin
            boot
        }
        GRUB_EOF

    - name: Standart x86 Boot Edilebilir ISO Uret
      run: |
        # Ubuntu üzerinde kesin çalısan evrensel xorriso komutu
        xorriso -as mkisofs -o skyos.iso iso

    - name: Ham ISO Dosyasini Yukle
      uses: actions/upload-artifact@v4
      with:
        name: SkyOS-Ham-ISO
        path: skyos.iso
        retention-days: 7
        compression-level: 0
