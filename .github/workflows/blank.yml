name: Build Installers and Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-linux-installer:
    runs-on: ubuntu-latest
    name: Build Linux Installer (.deb)
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev gcc
          sudo gem install fpm
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build Linux installer
        run: bash build.sh
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ScreenMirror-Linux-Installer
          path: ScreenMirror-Setup.deb

  build-windows-installer:
    runs-on: windows-latest
    name: Build Windows Installer (.exe)
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install NSIS
        uses: joncloud/makensis-action@v3.7
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build Windows installer
        run: build.bat
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ScreenMirror-Windows-Installer
          path: ScreenMirror-Setup.exe

  create-release:
    needs: [build-linux-installer, build-windows-installer]
    runs-on: ubuntu-latest
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v3
      
      - name: Download all artifacts
        uses: actions/download-artifact@v3
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ScreenMirror-Linux-Installer/ScreenMirror-Setup.deb
            ScreenMirror-Windows-Installer/ScreenMirror-Setup.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
