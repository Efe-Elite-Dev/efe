name: Build and Release

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        default: 'build'
        type: choice
        options:
          - build
          - start
          - stop

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build Linux
        run: |
          mkdir -p dist/linux
          pyinstaller --onefile --windowed --name ScreenMirror app_linux.py
          cp dist/ScreenMirror dist/linux/
          cd dist/linux && tar -czf ScreenMirror-Linux.tar.gz ScreenMirror
      
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: ScreenMirror-Linux
          path: dist/linux/ScreenMirror-Linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build Windows
        run: |
          mkdir dist\windows
          pyinstaller --onefile --windowed --name ScreenMirror app_windows.py
          Copy-Item "dist\ScreenMirror.exe" "dist\windows\"
          cd dist\windows
          powershell -Command "Compress-Archive -Path ScreenMirror.exe -DestinationPath ScreenMirror-Windows.zip"
      
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: ScreenMirror-Windows
          path: dist/windows/ScreenMirror-Windows.zip

  test:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      
      - name: Run tests
        run: pytest tests/ -v || true

  start-service:
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'start'
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Start
        run: |
          echo "[$(date)] Screen Mirror Service Starting..." >> service.log
          python -c "print('✓ Service Started')" >> service.log
          cat service.log

  stop-service:
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'stop'
    steps:
      - name: Stop
        run: |
          echo "[$(date)] Screen Mirror Service Stopped" >> service.log
          echo "✓ Service Stopped" >> service.log
