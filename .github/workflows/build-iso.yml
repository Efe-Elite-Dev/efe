name: Sky-OS Canavar ISO Derleme

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Gerekli İmaj Derleme Araçlarını Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y live-build xorriso squashfs-tools syslinux isolinux

    - name: Canlı Sistem Klasör Yapısını Hazırla
      run: |
        mkdir -p live_boot/chroot
        mkdir -p live_boot/binary/live
        mkdir -p live_boot/binary/isolinux

    - name: Bizim packages.txt Listesini Sisteme Çak
      run: |
        echo "Bulut sunucusu Sky-OS paketlerini hazırlıyor..."
        sudo apt-get update
        sudo xargs -a config/packages.txt apt-get install -y --download-only --no-install-recommends

    - name: Bizim Kodları Sistem Klasörlerine Kopyala
      run: |
        sudo mkdir -p live_boot/chroot/usr/local/bin
        sudo mkdir -p live_boot/chroot/src/store
        sudo mkdir -p live_boot/chroot/src/core
        sudo cp src/oobe/setup.py live_boot/chroot/usr/local/bin/sky-setup
        sudo cp src/core/sky-init.sh live_boot/chroot/usr/local/bin/sky-init.sh
        sudo cp src/core/sky-assistant.py live_boot/chroot/src/core/sky-assistant.py
        sudo cp src/store/skystore.py live_boot/chroot/src/store/skystore.py
        sudo chmod +x live_boot/chroot/usr/local/bin/sky-setup
        sudo chmod +x live_boot/chroot/usr/local/bin/sky-init.sh

    - name: Başlangıçta Direkt Bizim OOBE (Kurulum) Ekranını Tetikle
      run: |
        sudo mkdir -p live_boot/chroot/etc/skel
        echo "xinit /usr/local/bin/sky-setup" | sudo tee live_boot/chroot/etc/skel/.xinitrc

    - name: ISO Dosyasını Pişir (SquashFS & Xorriso)
      run: |
        echo "Miku çalıyor, işlemciler ISO dosyasını basıyor..."
        # 1. Sistemi SquashFS ile canavar gibi sıkıştırıyoruz
        sudo mksquashfs live_boot/chroot live_boot/binary/live/filesystem.squashfs -comp xz -e boot
        
        # 2. Önyükleme (Boot) dosyalarını hazırlıyoruz (Eğer klasör boşsa dummy oluşturur)
        sudo mkdir -p live_boot/chroot/boot
        sudo touch live_boot/chroot/boot/vmlinuz-dummy live_boot/chroot/boot/initrd.img-dummy
        sudo cp live_boot/chroot/boot/vmlinuz-* live_boot/binary/live/vmlinuz
        sudo cp live_boot/chroot/boot/initrd.img-* live_boot/binary/live/initrd
        
        # 3. GERÇEK ISOLINUX DOSYALARINI KOPYALIYORUZ (Hatanın Çözümü)
        sudo cp /usr/lib/ISOLINUX/isolinux.bin live_boot/binary/isolinux/
        sudo cp /usr/lib/syslinux/modules/bios/ldlinux.c32 live_boot/binary/isolinux/
        
        # 4. Basit bir Isolinux yapılandırması oluşturuyoruz ki sistem neyi başlatacağını bilsin
        echo -e "DEFAULT skyos\nLABEL skyos\n  KERNEL /live/vmlinuz\n  APPEND initrd=/live/initrd boot=live quiet splash" | sudo tee live_boot/binary/isolinux/isolinux.cfg
        
        # 5. Xorriso ile ISO kalıbını döküyoruz (Büyük harf kurallarına uygun VolID ile)
        sudo xorrisofs -r -V "SKY_OS" \
          -b isolinux/isolinux.bin -c isolinux/boot.cat \
          -no-emul-boot -boot-load-size 4 -boot-info-table \
          -output Sky-OS-Premium.iso live_boot/binary

    - name: Sky-OS ISO Dosyasını Yayıkla (Release)
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0-Alpha
        name: Sky-OS v1.0.0 Alpha Release
        files: Sky-OS-Premium.iso
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
