name: Sky-OS Auto Build CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla (Checkout)
      uses: actions/checkout@v4

    - name: Gerekli Derleme Araçlarını Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm gcc-multilib xorriso grub-pc-bin grub-common mtools

    - name: Dosyaları Güvenli Birleştir ve Derle
      run: |
        # 1. BOOT.ASM TEMİZLİĞİ
        sed '1d' boot.asm | tr -d '\r' > boot_temiz.asm

        # 2. KERNEL.C TEMİZLİĞİ
        sed '1d;$d' kernel.c | tr -d '\r' > kernel_temiz.c

        # 3. LINKER.LD TEMİZLİĞİ
        sed '1d;$d' linker.ld | tr -d '\r' > linker_temiz.ld

        echo "[+] Derleme başlatılıyor..."
        nasm -f elf32 boot_temiz.asm -o boot.o
        gcc -m32 -c kernel_temiz.c -o kernel.o -std=gnu99 -ffreestanding -O2 -Wall -Wextra
        ld -m elf_i386 -T linker_temiz.ld boot.o kernel.o -o mykernel.bin

    - name: ISO Klasör Yapısını ve GRUB Ayarlarını Kur
      run: |
        mkdir -p iso/boot/grub
        cp mykernel.bin iso/boot/
        
        cat << 'GRUB_EOF' > iso/boot/grub/grub.cfg
        set timeout=5
        set default=0
        menuentry "Sky-OS Saf AI Kernel" {
            multiboot /boot/mykernel.bin
            boot
        }
        GRUB_EOF

    - name: Boot Edilebilir ISO İmajını Üret
      run: |
        # VirtualBox'ın 'No bootable medium' hatası vermemesi için ISO'yu dosya sistemini bozmadan, saf üretiyoruz
        if command -v grub-mkisofs &> /dev/null; then
          grub-mkisofs -o data.iso iso
        else
          xorriso -as mkisofs -o data.iso iso
        fi

    - name: Ham ISO Dosyasını Yükle
      uses: actions/upload-artifact@v4
      with:
        name: my-raw-data
        path: data.iso
        retention-days: 7
        compression-level: 0  # Dosyayı ziplemeden ham bırakır
