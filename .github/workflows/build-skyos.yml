name: Sky-OS Auto Build CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla (Checkout)
      uses: actions/checkout@v4

    - name: Gerekli Derleme Araçlarını Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm gcc-multilib xorriso grub-pc-bin mtools

    - name: Dosyaları Güvenli Birleştir ve Derle
      run: |
        # 1. İlk satırdaki o hatalı/görünmez karakterli kısmı tamamen çöpe atıyoruz (1d)
        # 2. Dosyadaki Windows satır sonlarını (\r) temizleyip yeni bir geçici dosyaya yazıyoruz
        sed '1d' boot.asm | tr -d '\r' > boot_temiz.asm

        echo "[+] Senin orijinal dosyaların üzerinden derleme başlatılıyor..."
        
        # Sadece RAM üzerindeki temiz kopyayı derliyoruz, senin depondaki boot.asm güvende kalıyor
        nasm -f elf32 boot_temiz.asm -o boot.o
        
        # Senin orijinal C kodun derleniyor
        gcc -m32 -c kernel.c -o kernel.o -std=gnu99 -ffreestanding -O2 -Wall -Wextra
        
        # Senin orijinal linker script'in ile dosyalar nihai binary haline getiriliyor
        ld -m elf_i386 -T linker.ld boot.o kernel.o -o mykernel.bin

    - name: ISO Klasör Yapısını ve GRUB Ayarlarını Kur
      run: |
        mkdir -p iso/boot/grub
        cp mykernel.bin iso/boot/
        
        # Sadece GRUB menüsünü hazırlar
        cat << 'GRUB_EOF' > iso/boot/grub/grub.cfg
        set timeout=5
        set default=0
        menuentry "Sky-OS Saf AI Kernel" {
            multiboot /boot/mykernel.bin
            boot
        }
        GRUB_EOF

    - name: Boot Edilebilir ISO İmajını Üret
      run: |
        grub-mkisofs -o skyos.iso iso

    - name: ISO Dosyasını GitHub'a Yükle (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Sky-OS-Sanal-Disk
        path: skyos.iso
        retention-days: 7
